# Quorum — configuration
# ปรับค่าตรงนี้แล้วระบบจะอ่านอัตโนมัติ (ai-layer/config_loader.py)

[general]
# โหมดเทรด: "paper" (จำลอง) | "live" (เงินจริง) | "signal-only" (ส่งสัญญาณเฉย ๆ)
mode = "signal-only"

[market]
# broker ที่ใช้: "paper" | "bitkub"
broker = "bitkub"
# สัญลักษณ์ที่จะวิเคราะห์ — เลือกเองได้ (Bitkub ใช้รูปแบบ THB_BTC, THB_ETH, ...)
# CLI: python -m ai-layer.cli BTC ETH  จะ override ค่านี้
symbols = ["BTC", "ETH"]
quote = "THB"           # สกุลเงินอ้างอิงของ Bitkub
candle_interval = "1h"  # 1m, 5m, 15m, 1h, 4h, 1d
candle_lookback = 200   # จำนวนแท่งเทียนย้อนหลังที่ดึงมาวิเคราะห์

[agents]
# คณะที่ปรึกษาแบบ price+volume (ไม่พึ่งข่าว/เว็บ) — วิเคราะห์พร้อมกันแล้วโหวต
technical  = true       # โครงสร้างราคา/อินดิเคเตอร์ (quant, มี veto โครงสร้าง)
trend_ml   = true       # momentum/trend หลายสเกล + ตรวจ regime (quant)
flow       = true       # money-flow/volume (CMF, OBV, up/down vol) — แทน news+sentiment เดิม
# news/sentiment พึ่ง headline จากเว็บ → จะทำงานเฉพาะเมื่อ [news].enabled = true เท่านั้น
sentiment  = true       # วิเคราะห์ข่าว+เว็บแบบ lexicon (เปิดได้เมื่อ news.enabled=true)
news       = true       # ชั้นตรวจข่าววิกฤต + สิทธิ์ veto (เปิดได้เมื่อ news.enabled=true)

[consensus]
# "เอาแนวคิดที่ค่อนข้างจะตรงกัน" = ปรับ threshold ตรงนี้
min_agreement  = 3      # ต้องมี agent อย่างน้อยกี่ตัวเห็นตรงกัน (ลดเป็น 2 ถ้าอยากให้เข้าไม้บ่อยขึ้น)
min_confidence = 0.52   # BUY bar = +0.03 = 0.55 → รับ setup ที่ชนะ (cluster ~0.55); 0.60 รัดจนไม่เข้าไม้
# น้ำหนักเริ่มต้นของแต่ละ agent (จะถูกคูณกับ confidence)
[consensus.weights]
technical  = 1.0
trend_ml   = 1.0
flow       = 0.8
sentiment  = 0.6
news       = 0.8

[judge]
# Judge LLM ขั้นสุดท้าย — เน้น local ก่อน
enabled  = true
provider = "ollama"           # "ollama" | "groq" | "gemini" | "none"
# แนะนำสำหรับ MacBook Pro M-series RAM 24GB (Qwen3 — ใหม่/ดีกว่า 2.5):
#   qwen3:14b       → คุณภาพสูง เก่ง JSON/reasoning (~9GB, แนะนำเป็นหลัก)
#   qwen3:30b-a3b   → MoE คุณภาพสุด แต่ ~18GB ตึง (ใช้เมื่อไม่รัน FinBERT local)
#   qwen3:8b        → เร็วกว่า เหลือ RAM เยอะ (~5GB, ตัวสำรอง)
# ติดตั้ง: ollama pull qwen3:14b
# (Qwen3 มี thinking mode: เปิดเพื่อตัดสินดีขึ้น / ปิด /no_think เพื่อความเร็ว)
model    = "qwen3:14b"
ollama_url = "http://localhost:11434"
# fallback chain เมื่อตัวหลักล่ม (ซ้ายไปขวา)
fallback = ["ollama", "none"]

[news]
# ปิดข่าว/เว็บเป็นค่าเริ่มต้น — บนเซิร์ฟเวอร์เล็กการ scrape ช้า/ไม่นิ่ง/ไม่ช่วยเรื่องกำไร
# เปิด = true เพื่อเอา lens ข่าว (+ สิทธิ์ veto ข่าววิกฤต) กลับมา (ต้องตั้ง API key ผ่าน env)
enabled = false
provider = "auto"       # "finnhub" | "newsapi" | "rss" | "auto" | "none"
lookback_hours = 48
max_articles = 20

[learning]
# สมองเรียนรู้ด้วยตัวเอง — เก็บทุกคำตัดสิน แล้ว settle กับแท่งเทียนจริงเพื่อวัดผล (กำไร/ขาดทุนเป็น R)
# เรียนรู้ว่า setup แบบไหน "ขาดทุนซ้ำ ๆ" แล้วบล็อกไม่ให้เข้าไม้จริง (เก็บเป็น shadow trade แทน)
enabled            = true
fee_per_side       = 0.0025  # ค่าธรรมเนียม Bitkub ต่อข้าง (~0.25%) — ใช้คิด R สุทธิหลังหักค่าธรรมเนียม
max_settle_bars    = 48      # ถือสูงสุดกี่แท่งก่อน mark-to-market
max_entry_bars     = 12      # limit ต้องแตะจุดเข้าภายในกี่แท่ง มิฉะนั้นเป็น missed ไม่ใช่ win
min_samples_gate   = 6       # ต้องมีผลอย่างน้อยกี่ไม้ก่อนจะ "บล็อก" setup ได้ (ตัดไม้แพ้ไวขึ้น)
block_expectancy   = -0.08   # ถ้า avg R ของ setup ต่ำกว่านี้ = ขาดทุนซ้ำ → บล็อก
block_winrate_n    = 8       # ถ้ามีผล ≥ จำนวนนี้ และชนะ < 34% → บล็อก
breaker_expectancy = -0.15   # ถ้า live ล่าสุดขาดทุนเฉลี่ยต่ำกว่านี้ → โหมดตั้งรับ (เทรดเฉพาะ setup ที่พิสูจน์แล้ว)
conf_hi            = 1.15     # boost แบบจำกัด เฉพาะ setup ที่มีผลจริงรองรับ
require_proven_edge = false    # false = เทรดได้เลย (ยังบล็อกไม้แพ้ที่พิสูจน์แล้วผ่าน block_expectancy/winrate); true = รอ shadow พิสูจน์ก่อน → อาจไม่เข้าไม้หลายวัน
min_live_samples    = 12       # ต้องมีผลที่ fill จริงอย่างน้อยเท่านี้ก่อนปลดล็อก live
min_live_expectancy = 0.05     # expectancy หลัง fee ต้อง ≥ +0.05R
reentry_cooldown_bars   = 3    # หลังเหรียญหนึ่งขาดทุน ห้ามรีบซื้อซ้ำกี่แท่ง (กัน revenge-trade)
reentry_loss_threshold  = -0.5 # ขาดทุน ≤ ค่านี้ (R) ถึงจะเริ่มนับ cooldown (ไม้แพ้เล็กๆ ไม่นับ)

[market_quality]
# กันไม่ให้เทรด "ตลาดที่ชนะไม่ได้" (เหรียญบาง/ผันผวนเกิน/sideways/แทบไม่ขยับ/เป้าใกล้จนค่าธรรมเนียมกิน)
enabled           = true
min_liquidity_thb = 15000.0  # คลายให้เล่นเหรียญเล็กลงได้ (50k บล็อกเหรียญส่วนใหญ่บน Bitkub) — ยังกันตัวบางสุด
max_atr_pct       = 0.04     # ATR เกิน 4%/แท่ง = ผันผวนเกิน (1.5×ATR stop = เพดาน -6%) → ไม่เข้า
min_target_move   = 0.012    # เป้าต้องห่างจากจุดเข้าอย่างน้อย ~1.2% (ให้พ้นค่าธรรมเนียมไป-กลับ ~0.5%)
min_net_rr        = 1.2      # reward:risk หลังหักค่าธรรมเนียมต้อง ≥ ค่านี้
chop_er           = 0.12     # Efficiency Ratio ต่ำกว่านี้...
chop_adx          = 18.0     # ...และ ADX ต่ำกว่านี้ = ตลาดแกว่ง ไม่มี edge → ไม่เข้า
flat_atr_pct      = 0.003    # ATR ต่ำกว่า 0.3% ของราคา = แทบไม่ขยับ → ไม่เข้า

[risk]
max_position_pct   = 0.10   # ขนาดสูงสุดต่อ 1 position (ของพอร์ต)
daily_loss_limit   = 0.05   # หยุดเทรดเมื่อขาดทุนเกิน 5% ต่อวัน
max_open_positions = 5
